upstream backend {
    server backend:8000;
}

upstream backend_wms {
    server backend-wms:8000;
}

server {
    listen 80;
    server_name _; # Listen for any hostname

    # Increase max body size for file uploads if necessary
    client_max_body_size 100M;

    # Serve static files directly
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d; # Cache static files for 7 days
        add_header Pragma public;
        add_header Cache-Control "public";
    }

    # Serve media files with authentication via X-Accel-Redirect
    # This location is internal - only accessible via Django redirects
    location /media/ {
        internal;
        alias /usr/share/nginx/html/media/;
        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        # Enable caching for media files
        expires 1h;
        add_header Cache-Control "private, must-revalidate";
    }

    # WMS tile caching - routes to dedicated WMS worker pool
    # Cache key excludes token so tiles are shared across users
    location /api/v1/wms-proxy/ {
        proxy_cache wms_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_key "$uri$arg_LAYERS$arg_BBOX$arg_WIDTH$arg_HEIGHT$arg_CRS$arg_FORMAT";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://backend_wms;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # MVT tile caching
    location ~ ^/api/v1/ol_\w+_tiles/ {
        proxy_cache mvt_cache;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 204 10m;
        proxy_cache_key "$uri$is_args$args";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy everything else to the Django backend
    location / {
        proxy_pass http://backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_buffering off; # Useful for streaming responses if any
    }
} 
services:
  db:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: qonnectra/db:latest
    container_name: qonnectra_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      QGIS_DB_USER: ${QGIS_DB_USER:-}
      QGIS_DB_PASSWORD: ${QGIS_DB_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - qonnectra_network
    shm_size: 256m
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=database"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: qonnectra/backend:latest
    container_name: qonnectra_backend_prod
    restart: always
    command: >
      sh -c "python manage.py compilemessages &&
            python manage.py collectstatic --noinput &&
            python manage.py migrate &&
            python manage.py shell -c \"from django.contrib.auth import get_user_model; import os; User = get_user_model(); username = os.environ.get('DJANGO_SUPERUSER_USERNAME'); User.objects.filter(username=username).exists() or User.objects.create_superuser(username, os.environ.get('DJANGO_SUPERUSER_EMAIL'), os.environ.get('DJANGO_SUPERUSER_PASSWORD'))\" &&
            python manage.py load_initial_data &&
            gunicorn --bind 0.0.0.0:8000 core.wsgi:application"
    expose:
      - "8000"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - ./qgis/projects:/app/qgis/projects
    environment:
      - DEBUG=${DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - USE_COOKIE_DOMAIN_MIDDLEWARE=${USE_COOKIE_DOMAIN_MIDDLEWARE}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DEFAULT_SRID=${DEFAULT_SRID}
      - QGIS_PG_SERVICE_NAME=${QGIS_PG_SERVICE_NAME:-qonnectra}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - qonnectra_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=backend"

  qgis-server:
    image: qgis/qgis-server:latest
    container_name: qonnectra_qgis_server_prod
    restart: always
    command:
      - sh
      - -c
      - |
        mkdir -p /etc/postgresql-common &&
        printf '[%s]\nhost=db\nport=5432\ndbname=%s\nuser=%s\npassword=%s\nsslmode=disable\n' "$${QGIS_PG_SERVICE_NAME}" "$${DB_NAME}" "$${QGIS_DB_USER}" "$${QGIS_DB_PASSWORD}" > /etc/postgresql-common/pg_service.conf &&
        mkdir -p /var/www/data/qgis &&
        ln -sf /usr/lib/cgi-bin/qgis_mapserv.fcgi /var/www/data/qgis/qgis_mapserv.fcgi &&
        rm -f /tmp/.X99-lock &&
        fc-cache &&
        /usr/bin/Xvfb :99 -ac -screen 0 1280x1024x16 +extension GLX +render -noreset >/dev/null &
        sleep 2 &&
        grep -q 'client_max_body_size' /etc/nginx/nginx.conf || sed -i '/http {/a \    client_max_body_size 500M;' /etc/nginx/nginx.conf &&
        nginx &&
        spawn-fcgi -n -u www-data -g www-data -d /var/lib/qgis -P /run/qgis.pid -p 9993 -- /usr/lib/cgi-bin/qgis_mapserv.fcgi &&
        tail -f /dev/null
    expose:
      - "80"
    volumes:
      - ./qgis/projects:/projects:ro
      - ./qgis/data:/data:ro
      - ./qgis/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - QGIS_SERVER_LOG_LEVEL=1
      - QGIS_SERVER_LOG_STDERR=1
      - QGIS_FCGI_MIN_PROCESSES=2
      - QGIS_FCGI_MAX_PROCESSES=8
      - PGSERVICEFILE=/etc/postgresql-common/pg_service.conf
      - QGIS_PG_SERVICE_NAME=${QGIS_PG_SERVICE_NAME:-qonnectra}
      - DB_NAME=${DB_NAME}
      - QGIS_DB_USER=${QGIS_DB_USER}
      - QGIS_DB_PASSWORD=${QGIS_DB_PASSWORD}
      - DISPLAY=:99
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - qonnectra_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=qgis-server"

  backend-wms:
    image: qonnectra/backend:latest
    container_name: qonnectra_backend_wms_prod
    restart: always
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 60 core.wsgi:application
    expose:
      - "8000"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - USE_COOKIE_DOMAIN_MIDDLEWARE=${USE_COOKIE_DOMAIN_MIDDLEWARE}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DEFAULT_SRID=${DEFAULT_SRID}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - qonnectra_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=backend-wms"

  pg-error-parser:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: qonnectra/pg-error-parser:latest
    container_name: qonnectra_pg_error_parser_prod
    restart: always
    command: python manage.py parse_pg_errors --container qonnectra_db_prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DEBUG=${DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - qonnectra_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=pg-error-parser"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - API_URL=${API_URL}
        - PUBLIC_API_URL=${PUBLIC_API_URL}
        - PUBLIC_TILE_SERVER_URL=${PUBLIC_TILE_SERVER_URL}
    image: qonnectra/frontend:latest
    env_file:
      - .env
    container_name: qonnectra_frontend_prod
    restart: always
    expose:
      - "3000"
    environment:
      - ORIGIN=https://${APP_DOMAIN}
      - NODE_ENV=production
      - API_URL=${API_URL}
      - PUBLIC_API_URL=${PUBLIC_API_URL}
      - PUBLIC_TILE_SERVER_URL=${PUBLIC_TILE_SERVER_URL}
    networks:
      - qonnectra_network
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=frontend"

  nginx:
    image: nginx:stable-alpine
    container_name: qonnectra_nginx_prod
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
      - wms_cache:/var/cache/nginx/wms
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - qonnectra_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: qonnectra_tileserver_prod
    restart: always
    user: "1000:1000"
    volumes:
      - ./tiles:/data:ro
    command:
      [
        "--config",
        "/data/config.json",
        "--public_url",
        "https://${TILE_SERVER_DOMAIN}",
      ]
    expose:
      - "8080"
    networks:
      - qonnectra_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=tileserver"

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: qonnectra_wireguard_prod
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - SERVERURL=${WIREGUARD_SERVERURL:-auto}
      - SERVERPORT=${WIREGUARD_PORT:-51820}
      - PEERS=${WIREGUARD_PEERS:-}
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=10.13.13.0/24
    volumes:
      - ./wireguard:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WIREGUARD_PORT:-51820}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - qonnectra_network
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=wireguard"

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    image: qonnectra/caddy:latest
    container_name: qonnectra_caddy_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./logs:/var/log/caddy
      - media_volume:/media:ro # Mount media volume for WebDAV access
    environment:
      - XDG_DATA_HOME=/data
      - XDG_CONFIG_HOME=/config
      - DOMAIN_NAME=${DOMAIN_NAME}
      - API_DOMAIN=${API_DOMAIN}
      - APP_DOMAIN=${APP_DOMAIN}
      - FILES_DOMAIN=${FILES_DOMAIN}
      - QGIS_DOMAIN=${QGIS_DOMAIN}
      - TILE_SERVER_DOMAIN=${TILE_SERVER_DOMAIN}
    cap_add:
      - NET_ADMIN
    depends_on:
      - nginx
      - frontend
      - qgis-server
      - tileserver
    networks:
      - qonnectra_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
    name: qonnectra_postgres_data_prod
    driver: local
  caddy_data:
    name: qonnectra_caddy_data_prod
    driver: local
  caddy_config:
    name: qonnectra_caddy_config_prod
    driver: local
  static_volume:
    name: qonnectra_static_prod
    driver: local
  media_volume:
    name: qonnectra_media_prod
    driver: local
  wms_cache:
    name: qonnectra_wms_cache_prod
    driver: local

networks:
  qonnectra_network:
    name: qonnectra_network_prod
    driver: bridge

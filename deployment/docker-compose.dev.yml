# Docker Compose for local development with Caddy (HTTPS via internal CA)
# Use: docker compose -f docker-compose.dev.yml up -d
#
# First run: Caddy will attempt to install its CA certificate.
# You may be prompted for your password to trust the certificate.
# After that, all *.localhost domains will work with valid HTTPS.

services:
  db:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: qonnectra/db:dev
    container_name: qonnectra_db_dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      QGIS_DB_USER: ${QGIS_DB_USER:-}
      QGIS_DB_PASSWORD: ${QGIS_DB_PASSWORD:-}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh
    expose:
      - "5432"
    ports:
      - "${DB_EXTERNAL_PORT:-5440}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qonnectra_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: qonnectra/backend:dev
    container_name: qonnectra_backend_dev
    restart: unless-stopped
    command: >
      sh -c "python manage.py collectstatic --noinput &&
            python manage.py migrate &&
            python manage.py shell -c \"from django.contrib.auth import get_user_model; import os; User = get_user_model(); username = os.environ.get('DJANGO_SUPERUSER_USERNAME'); User.objects.filter(username=username).exists() or User.objects.create_superuser(username, os.environ.get('DJANGO_SUPERUSER_EMAIL'), os.environ.get('DJANGO_SUPERUSER_PASSWORD'))\" &&
            python manage.py load_initial_data &&
            gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 60 core.wsgi:application"
    expose:
      - "8000"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - ./qgis/projects:/app/qgis/projects
      - ./qgis/data:/app/qgis/data
    environment:
      - DEBUG=${DEBUG:-True}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-api.localhost,localhost,127.0.0.1}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - USE_COOKIE_DOMAIN_MIDDLEWARE=${USE_COOKIE_DOMAIN_MIDDLEWARE:-True}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.localhost}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DEFAULT_SRID=${DEFAULT_SRID:-25832}
      - QGIS_PG_SERVICE_NAME=${QGIS_PG_SERVICE_NAME:-qonnectra}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://app.localhost}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://api.localhost,https://app.localhost}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - QGIS_DOMAIN=${QGIS_DOMAIN:-qgis.localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - qonnectra_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qgis-server:
    image: qgis/qgis-server:3.44.7-noble
    container_name: qonnectra_qgis_server_dev
    restart: unless-stopped
    command: >
      sh -c "
        mkdir -p /etc/postgresql-common &&
        cat > /etc/postgresql-common/pg_service.conf <<EOF
      [${QGIS_PG_SERVICE_NAME:-qonnectra}]
      host=db
      port=5432
      dbname=${DB_NAME}
      user=${QGIS_DB_USER}
      password=${QGIS_DB_PASSWORD}
      sslmode=disable
      EOF
        mkdir -p /var/www/data/qgis &&
        ln -sf /usr/lib/cgi-bin/qgis_mapserv.fcgi /var/www/data/qgis/qgis_mapserv.fcgi &&
        rm -f /tmp/.X99-lock &&
        fc-cache &&
        /usr/bin/Xvfb :99 -ac -screen 0 1280x1024x16 +extension GLX +render -noreset >/dev/null &
        sleep 2 &&
        grep -q 'client_max_body_size' /etc/nginx/nginx.conf || sed -i '/http {/a \    client_max_body_size 500M;' /etc/nginx/nginx.conf &&
        nginx &&
        spawn-fcgi -n -u www-data -g www-data -d /var/lib/qgis -P /run/qgis.pid -p 9993 -- /usr/lib/cgi-bin/qgis_mapserv.fcgi &&
        tail -f /dev/null
      "
    expose:
      - "80"
    volumes:
      - ./qgis/projects:/projects:ro
      - ./qgis/data:/data:ro
      - ./qgis/nginx.conf:/etc/nginx/sites-available/default:ro
    environment:
      - QGIS_SERVER_LOG_LEVEL=2
      - QGIS_SERVER_LOG_STDERR=1
      - QGIS_FCGI_MIN_PROCESSES=1
      - QGIS_FCGI_MAX_PROCESSES=4
      - PGSERVICEFILE=/etc/postgresql-common/pg_service.conf
      - QGIS_PG_SERVICE_NAME=${QGIS_PG_SERVICE_NAME:-qonnectra}
      - DB_NAME=${DB_NAME}
      - QGIS_DB_USER=${QGIS_DB_USER}
      - QGIS_DB_PASSWORD=${QGIS_DB_PASSWORD}
      - DISPLAY=:99
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - qonnectra_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pg-error-parser:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: qonnectra/pg-error-parser:dev
    container_name: qonnectra_pg_error_parser_dev
    restart: unless-stopped
    command: python manage.py parse_pg_errors --container qonnectra_db_dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DEBUG=${DEBUG:-True}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - qonnectra_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - API_URL=${API_URL:-https://api.localhost/api/v1/}
        - PUBLIC_API_URL=${PUBLIC_API_URL:-https://api.localhost/api/v1/}
        - PUBLIC_TILE_SERVER_URL=${PUBLIC_TILE_SERVER_URL:-https://tiles.localhost}
    image: qonnectra/frontend:dev
    container_name: qonnectra_frontend_dev
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - ORIGIN=https://app.localhost
      - NODE_ENV=production
      - API_URL=${API_URL:-https://api.localhost/api/v1/}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://api.localhost/api/v1/}
      - PUBLIC_TILE_SERVER_URL=${PUBLIC_TILE_SERVER_URL:-https://tiles.localhost}
    networks:
      - qonnectra_network
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:stable-alpine
    container_name: qonnectra_nginx_dev
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - qonnectra_network

  tileserver:
    image: maptiler/tileserver-gl:v5.6.0
    container_name: qonnectra_tileserver_dev
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ./tiles:/data:ro
    command:
      [
        "--config",
        "/data/config.json",
        "--public_url",
        "https://tiles.localhost",
      ]
    expose:
      - "8080"
    networks:
      - qonnectra_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    image: qonnectra/caddy:dev
    container_name: qonnectra_caddy_dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - media_volume:/media:ro
    environment:
      - XDG_DATA_HOME=/data
      - XDG_CONFIG_HOME=/config
    depends_on:
      - nginx
      - frontend
      - qgis-server
      - tileserver
    networks:
      - qonnectra_network

volumes:
  static_volume:
    name: qonnectra_static_dev
  media_volume:
    name: qonnectra_media_dev
  caddy_data:
    name: qonnectra_caddy_data_dev
  caddy_config:
    name: qonnectra_caddy_config_dev

networks:
  qonnectra_network:
    name: qonnectra_network_dev
    driver: bridge

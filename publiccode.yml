description:
  en:
    localisedName: Qonnectra
    shortDescription: Fiber optic documentation of passive networks.
    longDescription: >-
      Qonnectra is an open-source, web-based GIS application for documenting and
      managing municipal utility networks. It enables the documentation and
      visualization of fiber optic networks across all network levels – from
      main distribution points to individual building connections.


      The software is designed for municipalities, municipal associations, and
      small to mid-sized network operators such as public utilities that want to
      manage their network assets professionally and digitally. Qonnectra is
      browser-based, completely free of charge, and built entirely on
      open-source components – data sovereignty stays with the municipality.
    documentation: https://qonnectra.de/manual/
    features:
      - Geographic information system for telecommunications infrastructure
      - Interactive map interface
      - Management of trenches, conduits, microducts, nodes and addresses
      - Visual network schema editor
      - Multi-project organization
      - File storage and management
      - Integration with QGIS
      - REST API for third-party integrations
      - WMS
      - WFS
  de:
    localisedName: Qonnectra
    shortDescription: Glasfaserdokumentation von passiven Netzen
    longDescription: >-
      Qonnectra ist eine open-source, webbasierte GIS-Anwendung zur
      Dokumentation und Verwaltung kommunaler Versorgungsnetze. Sie ermöglicht
      die Dokumentation und Visualisierung von Glasfasernetzen über alle
      Netzebenen hinweg – von der Hauptverteilung bis zum einzelnen
      Hausanschluss.


      Die Software richtet sich an Kommunen, Zweckverbände und kleine bis
      mittlere Netzbetreiber wie Stadtwerke, die ihren Netzbestand professionell
      und digital betreiben wollen. Qonnectra ist browserbasiert, vollständig
      kostenfrei und setzt ausschließlich auf Open-Source-Komponenten – die
      Datenhoheit bleibt bei der Kommune.
    documentation: https://qonnectra.de/manual/
    features:
      - Geoinformationssystem für Telekommunikationsinfrastruktur
      - Interaktive Kartenoberfläche
      - Verwaltung von Trassen, Rohre, Kabel, Adressen und Netzknoten
      - Visueller Netzwerk-Schema-Editor
      - Multi-Projekt-Organisation
      - Dateispeicherung und -verwaltung
      - Integration mit QGIS
      - REST-API für Integrationen von Drittanbietern
      - WMS
      - WFS

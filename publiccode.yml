description:
  de:
    localisedName: Qonnectra
    shortDescription: >-
      Glasfaserdokumentation von passiven Netzen
    longDescription: >
      Qonnectra ist eine open-source, webbasierte GIS-Anwendung zur
      Dokumentation und Verwaltung kommunaler Versorgungsnetze. Sie ermöglicht
      die Dokumentation und Visualisierung von Glasfasernetzen über alle
      Netzebenen hinweg – von der Hauptverteilung bis zum einzelnen
      Hausanschluss.


      Die Software richtet sich an Kommunen, Zweckverbände und kleine bis
      mittlere Netzbetreiber wie Stadtwerke, die ihren Netzbestand professionell
      und digital betreiben wollen. Qonnectra ist browserbasiert, vollständig
      kostenfrei und setzt ausschließlich auf Open-Source-Komponenten – die
      Datenhoheit bleibt bei der Kommune.
    documentation: "https://qonnectra.de/manual/"
    features:
      - Geoinformationssystem für Telekommunikationsinfrastruktur
      - Interaktive Kartenoberfläche
      - Verwaltung von Trassen, Rohre, Kabel, Adressen und Netzknoten
      - Visueller Netzwerk-Schema-Editor
      - Multi-Projekt-Organisation
      - Dateispeicherung und -verwaltung
      - Integration mit QGIS
      - WMS
      - WFS

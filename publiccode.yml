  en:
    localisedName: Qonnectra
    shortDescription: >-
      Fiber optic documentation of passive networks.
    longDescription: >
      Qonnectra is an open-source, web-based GIS application for documenting and
      managing municipal utility networks. It enables the documentation and
      visualization of fiber optic networks across all network levels – from
      main distribution points to individual building connections.


      The software is designed for municipalities, municipal associations, and
      small to mid-sized network operators such as public utilities that want to
      manage their network assets professionally and digitally. Qonnectra is
      browser-based, completely free of charge, and built entirely on
      open-source components – data sovereignty stays with the municipality.
    documentation: "https://qonnectra.de/manual/"
    features:
      - Geographic information system for telecommunications infrastructure
      - Interactive map interface
      - Management of trenches, conduits, microducts, nodes and addresses
      - Visual network schema editor
      - Multi-project organization
      - File storage and management
      - Integration with QGIS
      - WMS
      - WFS
